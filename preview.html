<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>nugget contents</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#fff;color:#09090b;font-family:Inter,Pretendard,"Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif}button{font:inherit;border:0;background:none;cursor:pointer}a{color:inherit;text-decoration:none}.page{max-width:1440px;min-height:100vh;margin:0 auto;padding:24px 56px 56px;overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;gap:24px}.brand{font-size:25px;font-weight:650;letter-spacing:-.07em;line-height:1}.brand sup{font-size:14px}.tabs{display:flex;gap:6px;padding:4px;border-radius:999px;background:#f4f4f5}.tab{min-width:112px;padding:9px 15px;border-radius:999px;background:#fff;color:#09090b;box-shadow:0 8px 24px rgba(0,0,0,.06);font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}.contents{padding-top:26px}.quick{display:flex;justify-content:center;gap:8px;overflow-x:auto}.quick a{display:flex;align-items:center;gap:8px;border-radius:999px;background:rgba(255,255,255,.66);padding:6px 10px 6px 6px;box-shadow:0 8px 22px rgba(0,0,0,.035);font-size:11px;font-weight:750}.qicon{display:grid;place-items:center;width:28px;height:28px;border:1px solid #ececf0;border-radius:50%;background:#fff;overflow:hidden}.qicon img{width:18px;height:18px;object-fit:contain}.filters{display:flex;justify-content:center;margin:18px 0 22px}.filter-bar{display:inline-flex;gap:6px;border:1px solid #eee;border-radius:999px;padding:5px}.filter-bar button{border-radius:999px;padding:8px 12px;color:#a1a1aa;font-size:9px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}.filter-bar button.active{background:#09090b;color:#fff}.store{display:grid;grid-template-columns:1fr 176px;gap:16px}.hero-card{position:relative;min-height:470px;overflow:hidden;border:1px solid #e8e8eb;border-radius:8px;background:#f4f4f5}.hero-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.hero-card:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.94),rgba(255,255,255,.78) 28%,rgba(255,255,255,.16) 66%,rgba(255,255,255,.05))}.hero-copy{position:relative;z-index:2;display:flex;min-height:470px;width:min(390px,52%);flex-direction:column;justify-content:flex-end;padding:34px}.label{width:max-content;border:1px solid #ddd;border-radius:999px;background:#ffffffbb;padding:7px 10px;color:#52525b;font-size:8px;font-weight:850;letter-spacing:.14em;text-transform:uppercase}.hero-copy h1{margin:20px 0 0;font-size:clamp(42px,5vw,72px);font-weight:680;line-height:.88;letter-spacing:-.095em}.hero-copy p{max-width:340px;margin:16px 0 0;color:#3f3f46;font-size:13px;line-height:1.55}.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}.pill{border:1px solid #ddd;border-radius:999px;background:#fff;padding:8px 10px;font-size:10px;font-weight:750}.pill.dark{background:#09090b;color:#fff}.side{display:grid;gap:12px}.side-card{display:grid;grid-template-columns:58px 1fr;gap:12px;align-items:center}.side-card.active{border-radius:10px;background:#f7f7f8;padding:8px}.side-card img{width:58px;height:76px;border-radius:8px;object-fit:cover}.side-card h2{margin:0;font-size:12px;font-weight:650;line-height:1.12}.side-card p{margin:7px 0 0;color:#a1a1aa;font-size:7px;font-weight:850;letter-spacing:.12em;text-transform:uppercase}.shelf{display:grid;grid-template-columns:repeat(6,minmax(130px,1fr));gap:16px;margin-top:32px}.card img{width:100%;aspect-ratio:3/4.25;border:1px solid #eee;border-radius:6px;object-fit:cover;box-shadow:0 10px 24px rgba(9,9,11,.055)}.card h2{margin:10px 0 0;font-size:13px;font-weight:650;line-height:1.1}.card p{margin:5px 0 0;color:#a1a1aa;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}@media(max-width:1023px){.page{padding:24px 40px 48px}.store{grid-template-columns:1fr}.shelf{grid-template-columns:repeat(3,1fr)}}@media(max-width:767px){.page{padding:22px 20px 42px}.top{align-items:flex-start;flex-direction:column}.tabs{width:100%}.tab{width:100%}.quick{justify-content:flex-start}.hero-copy{width:100%;min-height:390px}.shelf{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="page">
    <header class="top"><div class="brand">nugget<sup>&deg;</sup></div><nav class="tabs"><button class="tab">Contents</button></nav></header>
    <section class="contents"><div class="quick" id="quick"></div><div class="filters"><div class="filter-bar" id="filters"></div></div><div class="store"><article class="hero-card" id="heroCard"></article><aside class="side" id="side"></aside></div><div class="shelf" id="shelf"></div></section>
  </main>
  <script>
    const links=[["YouTube","https://www.youtube.com"],["Naver","https://www.naver.com"],["GitHub","https://github.com"],["Instagram","https://www.instagram.com"],["Discord","https://discord.com"],["Twitch","https://www.twitch.tv"]];
    const filters=["All","Featured","Sale","Guide","Shorts","News"];let active="All";
    const recs=[
      {type:"Featured",title:"Hogwarts Legacy",label:"AI Pick",desc:"Use this as the main image-led content recommendation for today's gaming feed.",action:"Feature now",score:"92%",format:"Main",image:"https://cdn.akamai.steamstatic.com/steam/apps/990080/library_600x900.jpg",hero:"https://cdn.akamai.steamstatic.com/steam/apps/990080/library_hero.jpg"},
      {type:"Sale",title:"Dying Light 2 Stay Human",label:"Sale",desc:"Discount timing and survival-game interest overlap well.",action:"Deal post",score:"88%",format:"Base game",image:"https://cdn.akamai.steamstatic.com/steam/apps/534380/library_600x900.jpg"},
      {type:"Featured",title:"Marvel's Spider-Man Remastered",label:"Feature",desc:"Strong fit for action clips and comparison thumbnails.",action:"Clip edit",score:"86%",format:"Base game",image:"https://cdn.akamai.steamstatic.com/steam/apps/1817070/library_600x900.jpg"},
      {type:"Guide",title:"God of War",label:"Guide",desc:"Good fit for beginner guides and story recap content.",action:"Guide card",score:"84%",format:"Base game",image:"https://cdn.akamai.steamstatic.com/steam/apps/1593500/library_600x900.jpg"},
      {type:"Shorts",title:"Goat Simulator 3",label:"Shorts",desc:"Use for quick meme-style clips and reaction tests.",action:"Shorts",score:"81%",format:"Base game",image:"https://cdn.akamai.steamstatic.com/steam/apps/850190/library_600x900.jpg"},
      {type:"Featured",title:"Marvel's Spider-Man: Miles Morales",label:"Feature",desc:"Hero action imagery is useful for thumbnail clicks.",action:"Image post",score:"83%",format:"Base game",image:"https://cdn.akamai.steamstatic.com/steam/apps/1817190/library_600x900.jpg"},
      {type:"Sale",title:"Cyberpunk 2077",label:"Sale",desc:"Bundle discount and update angles together.",action:"Deal roundup",score:"89%",format:"Base game",image:"https://cdn.akamai.steamstatic.com/steam/apps/1091500/library_600x900.jpg"}
    ];
    function favicon(url){try{return "https://www.google.com/s2/favicons?domain="+new URL(url).hostname+"&sz=64"}catch{return""}}
    function renderQuick(){quick.innerHTML=links.map(([n,u])=>`<a href="${u}" target="_blank" rel="noreferrer"><span class="qicon"><img src="${favicon(u)}" alt=""></span><span>${n}</span></a>`).join("")}
    function renderFilters(){filters.innerHTML=filters.map(f=>`<button class="${f===active?"active":""}" data-filter="${f}">${f}</button>`).join("")}
    function renderRecs(){const list=recs.filter(r=>active==="All"||r.type===active);const items=list.length?list:recs;const f=items[0];heroCard.innerHTML=`<img src="${f.hero||f.image}" alt=""><div class="hero-copy"><span class="label">${f.label}</span><h1>${f.title}</h1><p>${f.desc}</p><div class="pills"><span class="pill dark">${f.action}</span><span class="pill">${f.format}</span><span class="pill">Match ${f.score}</span></div></div>`;side.innerHTML=recs.slice(0,5).map(r=>`<article class="side-card ${r.title===f.title?"active":""}"><img src="${r.image}" alt=""><div><h2>${r.title}</h2><p>${r.type} / ${r.score}</p></div></article>`).join("");shelf.innerHTML=items.slice(1,7).map(r=>`<article class="card"><img src="${r.image}" alt=""><h2>${r.title}</h2><p>${r.format}</p></article>`).join("")}
    filters.onclick=e=>{if(e.target.dataset.filter){active=e.target.dataset.filter;renderFilters();renderRecs()}};
    if(location.hash!=="#contents") history.replaceState(null,"","#contents");
    renderQuick();renderFilters();renderRecs();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <meta name="description" content="너겟 게임 매거진의 작업·분석 대시보드. @nugget_zine 팔로워·발행 현황과 큐레이션 소스 모음." />
  <title>너겟 작업 사이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=20260517">
  <script id="cache-bust">
    (function(){
      var b = Date.now();
      var l = document.querySelector('link[href*="style.css"]');
      if (l) l.href = './style.css?b=' + b;
      window.__bust = b;
    })();
  </script>
</head>
<body>

  <nav class="page-nav">
    <div class="pn-left">
      <button class="page-tab active" data-page="dashboard">대시보드</button>
      <button class="page-tab" data-page="content">콘텐츠</button>
    </div>
    <div class="global-search-wrap">
      <div class="global-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="globalSearch" type="text" placeholder="검색 (게시물·매체·커뮤니티)" autocomplete="off"/>
        <button class="gs-clear" id="gsClear" aria-label="지우기" style="display:none">×</button>
      </div>
      <div class="global-search-results" id="gsResults" hidden></div>
    </div>
  </nav>

  <div class="app page-section active" data-page-section="dashboard">

    <aside class="col-left">

      <div class="followers-mini">
        <div class="fm-head">
          <div class="fm-title">팔로워 추이</div>
          <div class="fm-tabs" role="tablist">
            <button class="fm-tab" data-period="D">일</button>
            <button class="fm-tab" data-period="W">주</button>
            <button class="fm-tab" data-period="M">월</button>
            <button class="fm-tab active" data-period="Y">연</button>
          </div>
        </div>
        <div class="fm-compare">
          <div class="fm-side fm-prev">
            <div class="fm-label" id="prevLabel">지난</div>
            <div class="fm-num" id="prevNum">—</div>
            <div class="fm-meta" id="prevMeta">—</div>
          </div>
          <div class="fm-side fm-cur">
            <div class="fm-label" id="curLabel">현재</div>
            <div class="fm-num" id="curNum">—</div>
            <div class="fm-meta" id="curMeta">—</div>
          </div>
        </div>
        <div class="fm-chart" id="followersChart"></div>
        <div class="fm-foot" id="followersFoot"></div>
      </div>

      <div class="ai-insight-block">
        <div class="quote" id="aiSummary"></div>
        <div class="by"></div>
      </div>

      <div class="left-spacer"></div>
    </aside>

    <section class="col-center">

      <div class="hero-card">
        <div class="hero-image">
          <div class="hero-meta-top">
            <span class="when" id="heroWhen"></span>
            <a class="open-link" id="heroLink" href="#" target="_blank" rel="noopener" title="인스타그램에서 보기">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
            </a>
          </div>
          <div class="hero-tag">
            <span class="live-dot"></span>
            <span>이번 주 베스트</span>
          </div>
          <div class="hero-body">
            <div class="hero-eyebrow" id="heroSource">매체 · 유형</div>
            <h1 class="hero-title" id="heroTitle">불러오는 중...</h1>
            <p class="hero-summary" id="heroSummary"></p>
            <div class="hero-stats">
              <span>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21l-1.5-1.4C5 14.6 2 11.9 2 8.5 2 5.9 4 4 6.5 4c1.5 0 2.9.7 3.7 1.8L12 7.5l1.8-1.7C14.6 4.7 16 4 17.5 4 20 4 22 5.9 22 8.5c0 3.4-3 6.1-8.5 11.1L12 21z"/></svg>
                <span id="heroLikes">0</span>
              </span>
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0z"/><path d="M10 8l6 4-6 4z"/></svg>
                <span id="heroComments">0</span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="progress-pill">
        <div class="end-dot filled"></div>
        <div class="track"><div class="fill" style="width:0"></div></div>
        <div class="center-mark">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
        </div>
        <div class="track"><div class="fill" style="width:0"></div></div>
        <div class="end-dot"></div>
        <div class="week-label"></div>
      </div>
    </section>

    <aside class="col-right">

      <div>
        <div class="label-eyebrow" style="padding-left:2px;margin-bottom:12px;">최근 발행</div>
        <div class="recent-list" id="recentList"></div>
      </div>

      <div class="weekly-card">
        <div class="head">
          <div>
            <div class="label-eyebrow">주간 발행</div>
            <div class="head-num" id="weeklyTotal">0</div>
          </div>
          <span style="font-size:10px;color:var(--text-3);letter-spacing:0.4px;">총 / 일평균 <strong id="weeklyAvg" style="color:var(--text);font-weight:600;">0</strong></span>
        </div>
        <div class="weekly-bars" id="weeklyBars"></div>
      </div>

      <div>
        <div class="label-eyebrow" style="padding-left:2px;margin-bottom:8px;">발행 형태</div>
        <div class="formats-row">
          <div class="formats-info" id="formatsInfo"></div>
          <div class="donut-wrap">
            <svg id="donutSvg" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border-soft)" stroke-width="9"/>
            </svg>
            <div class="center">
              <span id="donutTotal">0</span>
              <small>총 발행</small>
            </div>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <main class="content-app page-section" data-page-section="content">
    <header class="content-head">
      <h2 class="content-title">콘텐츠 소스</h2>
      <p class="content-sub">너겟이 매일 훑는 국내·해외 매체와 커뮤니티</p>
    </header>
    <div class="links-grid" id="linksGrid"></div>
  </main>

  <div class="dummy-notice" id="dummyNotice"></div>

  <script>(function(){var s=document.createElement("script");s.src="./app.js?b="+(window.__bust||Date.now());document.body.appendChild(s);})();</script>
</body>
</html>

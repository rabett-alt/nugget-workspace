<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>너겟 작업 사이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">

    <aside class="col-left">
      <div class="top-row">
        <div class="logo-mark">너</div>
        <button class="menu-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          메뉴
        </button>
      </div>

      <div class="followers-mini">
        <div class="top">
          <span class="num" id="followersNum">0</span>
          <span class="delta" id="followersDelta">+0%</span>
        </div>
        <div class="sub">팔로워 · 지난 30일</div>
        <div class="chart" id="followersChart"></div>
      </div>

      <div class="ai-insight-block">
        <div class="quote" id="aiSummary">불러오는 중...</div>
        <div class="by">
          <span class="dot"></span>
          <span>너겟 비서 · </span>
          <span id="aiTime">--:--</span>
        </div>
      </div>

      <div class="ctas-row">
        <button class="pill-btn dark">큐 보기</button>
        <button class="pill-btn ghost">통계</button>
      </div>

      <div class="left-spacer"></div>

      <div class="bottom-mini">
        <div class="thumb" id="latestThumb">
          <span class="thumb-label">최신</span>
        </div>
        <button class="next-btn" aria-label="다음">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
        <div class="caps">
          <span></span><span></span>
        </div>
      </div>
    </aside>

    <section class="col-center">
      <div class="filter-tabs">
        <button class="tab active">전체</button>
        <button class="tab">캐러셀</button>
        <button class="tab">릴스</button>
        <button class="tab">포스트</button>
      </div>

      <div class="hero-card">
        <div class="hero-image">
          <div class="hero-tag">
            <span class="live-dot"></span>
            <span>이번 주 베스트</span>
          </div>
          <div class="hero-body">
            <div class="hero-eyebrow" id="heroSource">매체 · 유형</div>
            <h1 class="hero-title" id="heroTitle">불러오는 중...</h1>
            <p class="hero-summary" id="heroSummary"></p>
            <div class="hero-stats">
              <span>
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21l-1.5-1.4C5 14.6 2 11.9 2 8.5 2 5.9 4 4 6.5 4c1.5 0 2.9.7 3.7 1.8L12 7.5l1.8-1.7C14.6 4.7 16 4 17.5 4 20 4 22 5.9 22 8.5c0 3.4-3 6.1-8.5 11.1L12 21z"/></svg>
                <span id="heroLikes">0</span>
              </span>
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg>
                <span id="heroComments">0</span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="progress-pill">
        <div class="end-dot filled"></div>
        <div class="track"><div class="fill" id="progressFill" style="width:0"></div></div>
        <div class="center-mark">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
        </div>
        <div class="track"><div class="fill" id="progressFill2" style="width:0"></div></div>
        <div class="end-dot"></div>
        <div class="week-label" id="weekLabel">이번 주 0/15</div>
      </div>
    </section>

    <aside class="col-right">
      <div class="search-row">
        <div class="search-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input placeholder="raw 항목 검색"/>
        </div>
        <div class="avatar-mini">너</div>
      </div>

      <div>
        <div class="label-eyebrow" style="padding-left:6px;margin-bottom:10px;">최근 발행</div>
        <div class="recent-list" id="recentList"></div>
      </div>

      <div class="weekly-card">
        <div class="head">
          <div>
            <div class="label-eyebrow">주간 발행</div>
            <div class="head-num" id="weeklyTotal">0</div>
          </div>
          <span style="font-size:10px;color:var(--text-3);letter-spacing:0.4px;">총 / 일평균 <strong id="weeklyAvg" style="color:var(--text);font-weight:600;">0</strong></span>
        </div>
        <div class="weekly-bars" id="weeklyBars"></div>
      </div>

      <div>
        <div class="label-eyebrow" style="padding-left:6px;margin-bottom:6px;">발행 형태</div>
        <div class="formats-row">
          <div class="formats-info" id="formatsInfo"></div>
          <div class="donut-wrap">
            <svg id="donutSvg" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="42" fill="none" stroke="var(--bg)" stroke-width="9"/>
            </svg>
            <div class="center">
              <span id="donutTotal">0</span>
              <small>총 발행</small>
            </div>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <div class="dummy-notice" id="dummyNotice">⚠️ 표시된 데이터는 더미입니다. 인스타 API + 수집기 연동 후 자동 갱신됩니다.</div>

  <script src="./app.js"></script>
</body>
</html>

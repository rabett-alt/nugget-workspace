<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nugget Instagram connect</title>
    <style>
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;color:#09090b;font-family:Inter,Pretendard,"Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif}
      main{width:min(520px,calc(100vw - 40px));border:1px solid #ededf0;border-radius:28px;padding:24px;box-shadow:0 24px 80px rgba(9,9,11,.08)}
      h1{margin:0;font-size:42px;line-height:.88;letter-spacing:-.09em}p{color:#71717a;font-size:13px;line-height:1.55}button,a{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:999px;background:#09090b;color:#fff;padding:12px 16px;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer}button.secondary,a.secondary{background:#f4f4f5;color:#52525b}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}pre{margin-top:18px;white-space:pre-wrap;border-radius:18px;background:#fafafa;padding:14px;color:#27272a;font-size:12px;line-height:1.45}
    </style>
  </head>
  <body>
    <main>
      <h1>Instagram connect</h1>
      <p>Cloudflare Pages에 배포한 뒤 이 페이지에서 Instagram 계정을 연결하고 API 상태를 확인합니다.</p>
      <div class="actions">
        <a href="/api/instagram/connect">Connect Instagram</a>
        <button class="secondary" id="status">Check status</button>
        <button class="secondary" id="insights">Fetch insights</button>
      </div>
      <pre id="output">Ready.</pre>
    </main>
    <script>
      const output = document.getElementById('output');
      async function show(path){
        output.textContent = 'Loading ' + path + ' ...';
        try {
          const res = await fetch(path, { cache: 'no-store' });
          const data = await res.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = error.message;
        }
      }
      document.getElementById('status').onclick = () => show('/api/instagram/status');
      document.getElementById('insights').onclick = () => show('/api/instagram/insights');
      show('/api/instagram/status');
    </script>
  </body>
</html>
